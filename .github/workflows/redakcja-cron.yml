name: Redakcja — automatyczne generowanie artykułu

on:
  schedule:
    # Codziennie o 06:00 UTC (08:00 czasu polskiego)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Generate daily article
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REDAKCJA_GENERATE_URL: ${{ vars.REDAKCJA_GENERATE_URL || secrets.REDAKCJA_GENERATE_URL }}
        run: |
          if [ -z "$REDAKCJA_GENERATE_URL" ]; then
            echo "::error::Ustaw zmienne Actions: REDAKCJA_GENERATE_URL (pełny URL, np. https://platforma-edukacyjna.com/api/jobs/redakcja/generate) — Repository variables lub Secrets."
            exit 1
          fi
          echo "Generating article: $REDAKCJA_GENERATE_URL"
          curl -sS -i --fail-with-body \
            --max-time 120 --connect-timeout 10 \
            --retry 2 --retry-delay 2 --retry-connrefused \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "${REDAKCJA_GENERATE_URL}" \
            -w "\nHTTP_STATUS:%{http_code}\n"
